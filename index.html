<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome para Iconos Temporales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar (PC) -->
        <aside class="sidebar">
            <a href="index.html" class="brand-logo">GKey</a>
            
            <ul class="nav-links">
                <div class="nav-indicator"></div>
                <li class="nav-item active">
                    <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i></a>
                </li>
                <li class="nav-item">
                    <a href="catalogo.html" class="nav-link"><i class="fa-solid fa-gamepad"></i></a>
                </li>
                <li class="nav-item">
                    <a href="perfil.html" class="nav-link"><i class="fa-solid fa-user"></i></a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
                
                <div class="top-actions">
                    <button class="action-btn"><i class="fa-solid fa-bell"></i></button>
                    <button class="action-btn"><i class="fa-solid fa-bag-shopping"></i></button>
                    <div class="user-profile user-profile--loading" id="user-profile-btn" title="Cargando sesión…">
                        <img id="user-avatar" class="user-avatar user-avatar--skeleton" alt="">
                        <span id="user-name" class="user-name--skeleton"></span>
                    </div>
                </div>
            </header>

            <!-- Hero Skeleton -->
            <section class="hero-skeleton" id="hero-skeleton" aria-busy="true" aria-label="Cargando destacado">
                <div class="loading-state loading-state--inline">
                    <div class="ghost-loader" aria-hidden="true">
                        <div class="ghost-red">
                            <div class="ghost-pupil"></div>
                            <div class="ghost-pupil ghost-pupil1"></div>
                            <div class="ghost-eye"></div>
                            <div class="ghost-eye ghost-eye1"></div>
                            <div class="ghost-top0"></div>
                            <div class="ghost-top1"></div>
                            <div class="ghost-top2"></div>
                            <div class="ghost-top3"></div>
                            <div class="ghost-top4"></div>
                            <div class="ghost-st0"></div>
                            <div class="ghost-st1"></div>
                            <div class="ghost-st2"></div>
                            <div class="ghost-st3"></div>
                            <div class="ghost-st4"></div>
                            <div class="ghost-st5"></div>
                            <div class="ghost-an1"></div>
                            <div class="ghost-an2"></div>
                            <div class="ghost-an3"></div>
                            <div class="ghost-an4"></div>
                            <div class="ghost-an5"></div>
                            <div class="ghost-an6"></div>
                            <div class="ghost-an7"></div>
                            <div class="ghost-an8"></div>
                            <div class="ghost-an9"></div>
                            <div class="ghost-an10"></div>
                            <div class="ghost-an11"></div>
                            <div class="ghost-an12"></div>
                            <div class="ghost-an13"></div>
                            <div class="ghost-an14"></div>
                            <div class="ghost-an15"></div>
                            <div class="ghost-an16"></div>
                            <div class="ghost-an17"></div>
                            <div class="ghost-an18"></div>
                        </div>
                        <div class="ghost-shadow"></div>
                    </div>
                    <p class="loading-text">Buscando lo destacado…</p>
                </div>
            </section>

            <!-- Hero Banner -->
            <section class="hero-banner" id="hero-banner" style="display:none;">
                <span class="hero-tag" id="hero-tag">Destacado</span>
                <h1 class="hero-title" id="hero-title">...</h1>
                <p class="hero-price" id="hero-price">...</p>
                <div class="hero-actions">
                    <a href="#" id="hero-buy-btn" class="btn-primary" style="text-decoration:none;">Comprar Ahora</a>
                </div>
            </section>

            <!-- Horizontal Carousel -->
            <section>
                <div class="section-header">
                    <h2 class="section-title">Más Vendidos</h2>
                    <a href="catalogo.html" style="color:var(--accent-primary); text-decoration:none; font-size:0.9rem;">Ver todos <i class="fa-solid fa-arrow-right"></i></a>
                </div>
                
                <div class="horizontal-scroll" id="products-container">
                    <div class="loading-state">
                        <div class="ghost-loader" aria-hidden="true">
                            <div class="ghost-red">
                                <div class="ghost-pupil"></div>
                                <div class="ghost-pupil ghost-pupil1"></div>
                                <div class="ghost-eye"></div>
                                <div class="ghost-eye ghost-eye1"></div>
                                <div class="ghost-top0"></div>
                                <div class="ghost-top1"></div>
                                <div class="ghost-top2"></div>
                                <div class="ghost-top3"></div>
                                <div class="ghost-top4"></div>
                                <div class="ghost-st0"></div>
                                <div class="ghost-st1"></div>
                                <div class="ghost-st2"></div>
                                <div class="ghost-st3"></div>
                                <div class="ghost-st4"></div>
                                <div class="ghost-st5"></div>
                                <div class="ghost-an1"></div>
                                <div class="ghost-an2"></div>
                                <div class="ghost-an3"></div>
                                <div class="ghost-an4"></div>
                                <div class="ghost-an5"></div>
                                <div class="ghost-an6"></div>
                                <div class="ghost-an7"></div>
                                <div class="ghost-an8"></div>
                                <div class="ghost-an9"></div>
                                <div class="ghost-an10"></div>
                                <div class="ghost-an11"></div>
                                <div class="ghost-an12"></div>
                                <div class="ghost-an13"></div>
                                <div class="ghost-an14"></div>
                                <div class="ghost-an15"></div>
                                <div class="ghost-an16"></div>
                                <div class="ghost-an17"></div>
                                <div class="ghost-an18"></div>
                            </div>
                            <div class="ghost-shadow"></div>
                        </div>
                        <p class="loading-text">Cargando productos…</p>
                    </div>
                </div>
            </section>

        </main>

        <!-- Right Panel -->
        <aside class="right-panel">
            <div class="panel-section">
                <h3 class="panel-title">Friends Online - 6 / 45</h3>
                <div class="list-item">
                    <div class="list-icon"><img src="https://ui-avatars.com/api/?name=FA" alt="avatar"></div>
                    <div class="list-info">
                        <p class="list-name">Fahim Auditor</p>
                        <p class="list-desc">Apex</p>
                    </div>
                </div>
                 <div class="list-item">
                    <div class="list-icon"><img src="https://ui-avatars.com/api/?name=KF" alt="avatar"></div>
                    <div class="list-info">
                        <p class="list-name">Killer Freake</p>
                        <p class="list-desc">Dota 2</p>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-title">Parties</h3>
                <div class="list-item glass-panel">
                    <div class="list-icon" style="background: var(--accent-primary); color: white;"><i class="fa-solid fa-rocket"></i></div>
                    <div class="list-info">
                        <p class="list-name">Rocket League</p>
                        <p class="list-desc">Pushing to the right</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Mobile Dock -->
    <nav class="mobile-dock">
        <a href="index.html" class="dock-item active"><i class="fa-solid fa-house"></i></a>
        <a href="catalogo.html" class="dock-item"><i class="fa-solid fa-gamepad"></i></a>
        <a href="perfil.html" class="dock-item"><i class="fa-solid fa-user"></i></a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
