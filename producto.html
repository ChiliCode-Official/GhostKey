<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Digital Footprint</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/S00u4EI.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <img src="https://i.imgur.com/S00u4EI.png" alt="Logo" class="brand-icon">
                <span class="brand-name">FOOTPRINT</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </a>
                <a href="catalogo.html" class="nav-item active">
                    <i class="fas fa-th-large"></i>
                    <span>Catálogo</span>
                </a>
                <a href="metodos.html" class="nav-item">
                    <i class="fas fa-wallet"></i>
                    <span>Métodos</span>
                </a>
                <a href="comprar.html" class="nav-item">
                    <i class="fas fa-question-circle"></i>
                    <span>Ayuda</span>
                </a>
                <a href="contacto.html" class="nav-item">
                    <i class="fas fa-headset"></i>
                    <span>Contacto</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar" style="visibility: hidden;"></div>
                <div class="topbar-actions">
                    <div class="icon-btn" onclick="window.history.back()" style="cursor:pointer;">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                </div>
            </header>

            <div class="content-scroll" style="display: flex; align-items: center; justify-content: center; height: 100%;">
                <div class="modal-content" style="transform: none; display: flex; width: 100%; max-width: 900px; background: transparent; border: none;">
                    <div class="modal-image" style="border-radius: var(--radius-lg); overflow: hidden; height: 400px;" id="prodImgContainer">
                        <img id="prodImage" src="" alt="">
                    </div>
                    <div class="modal-details" style="background: var(--card-bg); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; border: 1px solid var(--border-color); border-left: none;">
                        <span id="prodCategory" style="color: var(--accent-yellow); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block;">Categoría</span>
                        <h2 id="prodName" style="font-size: 2.5rem; margin-bottom: 8px;">Cargando...</h2>
                        
                        <div id="stockBadgeContainer" style="margin-bottom: 16px;">
                            <!-- Injected stock phase badge -->
                        </div>

                        <p id="prodDesc" style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 32px; font-size: 0.95rem;">...</p>
                        
                        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 16px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <span style="font-size: 0.8rem; color: var(--text-secondary); display: block;">Precio Total</span>
                                    <span class="price" style="font-size: 2rem; color: white;" id="prodPrice">$0.00 <span style="font-size:1rem; color:var(--text-secondary);">MXN</span></span>
                                </div>
                                <div id="userBalanceText" style="font-size: 0.9rem; color: var(--text-secondary); text-align: right;">
                                    <!-- Injected balance -->
                                </div>
                            </div>
                            
                            <button id="buyButton" class="btn btn-white" style="padding: 16px 32px; font-size: 1.05rem; width: 100%;" disabled>Iniciando...</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="sparks.js"></script>
    <script src="products.js"></script>
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, addDoc, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let product = null;
        let userData = null;
        let stockStatus = 'disponible'; // Default

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                document.getElementById('prodName').textContent = 'Producto no encontrado';
                return;
            }

            // Fetch Product from Firestore
            try {
                const prodDoc = await getDoc(doc(db, "products", String(id)));
                if(prodDoc.exists()) {
                    product = prodDoc.data();
                } else if (typeof products !== 'undefined') {
                    // Fallback to local products.js if DB is completely empty (before admin seeded)
                    product = products.find(p => String(p.id) === String(id));
                }
            } catch(e) {
                console.error(e);
                if (typeof products !== 'undefined') {
                    product = products.find(p => String(p.id) === String(id));
                }
            }

            if (!product) {
                document.getElementById('prodName').textContent = 'Producto no encontrado';
                return;
            }

            // Fill UI basic details
            document.getElementById('prodName').textContent = product.name;
            document.getElementById('prodDesc').textContent = product.description;
            document.getElementById('prodPrice').innerHTML = `$${product.price.toFixed(2)} <span style="font-size:1rem; color:var(--text-secondary);">MXN</span>`;
            document.getElementById('prodImage').src = product.image;
            document.getElementById('prodCategory').textContent = product.category;

            // Fetch Real-time Stock Config from Firestore
            try {
                const stockDoc = await getDoc(doc(db, "products_stock", String(product.id)));
                if(stockDoc.exists()) {
                    stockStatus = stockDoc.data().status || 'disponible';
                    defaultCredentials = stockDoc.data().textToDeliver || '';
                }
            } catch(e) {
                console.error("Error fetching stock configuration:", e);
            }

            renderStockBadge();

            // Listen to auth
            onAuthStateChanged(auth, async (user) => {
                const buyBtn = document.getElementById('buyButton');
                const balanceText = document.getElementById('userBalanceText');
                
                if (user) {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        userData = userDoc.data();
                        userData.uid = user.uid;
                        balanceText.innerHTML = `Tu Saldo: <strong>$${userData.balance.toFixed(2)} MXN</strong>`;
                        
                        updateBuyButtonState();
                    }
                } else {
                    balanceText.textContent = "Inicia sesión para comprar";
                    buyBtn.textContent = "Iniciar sesión para comprar";
                    buyBtn.disabled = false;
                    buyBtn.onclick = () => window.location.href = 'perfil.html';
                }
            });
        });

        const renderStockBadge = () => {
            const container = document.getElementById('stockBadgeContainer');
            let badgeClass = 'stock-disponible';
            let label = 'Disponible';

            if (stockStatus === 'bajo_pedido') {
                badgeClass = 'stock-bajo-pedido';
                label = 'Bajo pedido';
            } else if (stockStatus === 'agotado') {
                badgeClass = 'stock-agotado';
                label = 'Agotado';
            }

            container.innerHTML = `<span class="stock-badge ${badgeClass}">${label}</span>`;
        };

        const updateBuyButtonState = () => {
            const buyBtn = document.getElementById('buyButton');
            
            if (stockStatus === 'agotado') {
                buyBtn.textContent = "PRODUCTO AGOTADO";
                buyBtn.disabled = true;
                buyBtn.onclick = null;
                return;
            }

            buyBtn.disabled = false;

            const price = product.price;
            const balance = userData.balance;

            if (balance >= price) {
                buyBtn.textContent = `COMPRAR CON SALDO ($${price.toFixed(2)} MXN)`;
                buyBtn.onclick = () => procesarCompra('saldo');
            } else if (balance > 0) {
                const restante = price - balance;
                buyBtn.textContent = `COMBINAR: $${balance.toFixed(2)} Saldo + $${restante.toFixed(2)} Transferencia`;
                buyBtn.onclick = () => procesarCompra('combinado');
            } else {
                buyBtn.textContent = "PAGAR CON TRANSFERENCIA BANCARIA";
                buyBtn.onclick = () => procesarCompra('transferencia');
            }
        };

        const procesarCompra = async (metodo) => {
            const buyBtn = document.getElementById('buyButton');
            buyBtn.disabled = true;
            buyBtn.textContent = "Procesando pedido...";

            try {
                const balance = userData.balance;
                const price = product.price;

                let finalStatus = 'pendiente';
                let finalDeliveredText = '';
                let finalBalance = balance;

                if (metodo === 'saldo') {
                    finalBalance = balance - price;
                } else if (metodo === 'combinado') {
                    finalBalance = 0;
                }

                // Create Order document in Firestore
                const orderData = {
                    uid: userData.uid, // Fixed to use uid instead of userId for consistency with query
                    userEmail: userData.email, // Use email instead of username
                    productId: product.id,
                    productName: product.name,
                    price: price,
                    status: finalStatus,
                    textDelivered: finalDeliveredText,
                    method: metodo, // consistent with admin query
                    timestamp: Date.now()
                };

                await addDoc(collection(db, "orders"), orderData);

                // Update User Balance in Firestore
                if (finalBalance !== balance) {
                    await updateDoc(doc(db, "users", userData.uid), {
                        balance: finalBalance
                    });
                }

                // Notify User and Redirect
                if (finalStatus === 'confirmado') {
                    alert("¡Compra exitosa! Tu saldo ha sido descontado y las credenciales han sido entregadas al instante en tu perfil.");
                    window.location.href = 'perfil.html';
                } else {
                    // Generate WhatsApp text for bank transfer confirmation
                    let whatsText = `Hola, he realizado un pedido en Digital Footprint:%0A`;
                    whatsText += `🛒 *${product.name}*%0A`;
                    whatsText += `💰 Método de pago: *${metodo.toUpperCase()}*%0A`;
                    
                    if (metodo === 'combinado') {
                        const restante = price - balance;
                        whatsText += `💵 Combinado: Utilicé $${balance.toFixed(2)} MXN de mi saldo y transferí el restante de *$${restante.toFixed(2)} MXN*.%0A`;
                    } else {
                        whatsText += `💵 Total a transferir: *$${price.toFixed(2)} MXN*.%0A`;
                    }
                    
                    whatsText += `👤 Email: *${userData.email}*%0A`;
                    whatsText += `Adjunto mi comprobante para la entrega.`;

                    alert("Pedido registrado. A continuación te redirigiremos a WhatsApp para enviar el comprobante de transferencia y activar tu servicio.");
                    window.location.open = `https://wa.me/525574123521?text=${whatsText}`;
                    window.location.href = 'perfil.html';
                }

            } catch(error) {
                alert("Error al procesar la compra: " + error.message);
                updateBuyButtonState();
            }
        };
    </script>
</body>
</html>
