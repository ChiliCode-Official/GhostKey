<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | GhostKey</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/S00u4EI.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <img src="https://i.imgur.com/S00u4EI.png" alt="Logo" class="brand-icon">
                <span class="brand-name">GHOSTKEY</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </a>
                <a href="catalogo.html" class="nav-item active">
                    <i class="fas fa-th-large"></i>
                    <span>CatÃ¡logo</span>
                </a>
                <a href="metodos.html" class="nav-item">
                    <i class="fas fa-wallet"></i>
                    <span>MÃ©todos</span>
                </a>
                <a href="comprar.html" class="nav-item">
                    <i class="fas fa-question-circle"></i>
                    <span>Ayuda</span>
                </a>
                <a href="contacto.html" class="nav-item">
                    <i class="fas fa-headset"></i>
                    <span>Contacto</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar" style="visibility: hidden;"></div>
                <div class="topbar-actions">
                    <div class="icon-btn" onclick="window.history.back()" style="cursor:pointer;">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                </div>
            </header>

            <div class="content-scroll" style="display: flex; align-items: center; justify-content: center; height: 100%;">
                <div class="modal-content" style="transform: none; display: flex; width: 100%; max-width: 900px; background: transparent; border: none;">
                    <div class="modal-image" style="border-radius: var(--radius-lg); overflow: hidden; height: 400px;" id="prodImgContainer">
                        <img id="prodImage" src="" alt="">
                    </div>
                    <div class="modal-details" style="background: var(--card-bg); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; border: 1px solid var(--border-color); border-left: none;">
                        <span id="prodCategory" style="color: var(--accent-yellow); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block;">CategorÃ­a</span>
                        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 8px;">
                            <h2 id="prodName" style="font-size: 2.5rem; margin-bottom: 0;">Cargando...</h2>
                            <button class="wishlist-btn" id="prodWishlistBtn" onclick="toggleWishlist(new URLSearchParams(window.location.search).get('id'))" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:2rem; transition:color 0.3s; margin-top:5px;"><i class="far fa-heart"></i></button>
                        </div>
                        
                        <div id="stockBadgeContainer" style="margin-bottom: 16px;">
                            <!-- Injected stock phase badge -->
                        </div>

                        <p id="prodDesc" style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 32px; font-size: 0.95rem;">...</p>
                        
                        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 16px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <span style="font-size: 0.8rem; color: var(--text-secondary); display: block;">Precio Total</span>
                                    <span class="price" style="font-size: 2rem; color: white;" id="prodPrice">$0.00 <span style="font-size:1rem; color:var(--text-secondary);">MXN</span></span>
                                </div>
                                <div style="text-align: right;">
                                    <div id="userBalanceText" style="font-size: 0.9rem; color: var(--text-secondary);">
                                        <!-- Injected balance -->
                                    </div>
                                </div>
                            </div>

                            <!-- Partial Credit Selector -->
                            <div id="balanceSelectorContainer" style="display:none; background: rgba(0,0,0,0.3); padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                                <label style="font-size: 0.85rem; color: var(--text-secondary); display:block; margin-bottom: 8px;">CrÃ©ditos a usar:</label>
                                <div style="display: flex; gap: 10px; align-items: center;">
                                    <input type="number" id="balanceToUseInput" class="admin-input" style="flex-grow:1; text-align:right;" min="0" value="0">
                                    <span style="color:var(--text-secondary);">MXN</span>
                                </div>
                            </div>
                            
                            <div style="display:flex; gap:12px;">
                                <button id="buyButton" class="btn btn-white" style="flex-grow:1; padding: 16px; font-size: 1.05rem;" disabled>Iniciando...</button>
                                <button id="giftButton" class="btn btn-primary" style="padding: 16px; font-size: 1.05rem; background:rgba(88,32,168,0.3); border:1px solid rgba(122,61,214,0.5); border-radius: var(--radius-sm); color:var(--accent-yellow);" disabled title="Regalar a un Amigo">
                                    <i class="fas fa-gift"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Gift Modal -->
    <div class="modal" id="giftModal">
        <div class="modal-content" style="max-width: 400px; padding: 24px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h3 style="margin:0;"><i class="fas fa-gift" style="color:var(--accent-yellow); margin-right:8px;"></i>Regalar Amigo</h3>
                <i class="fas fa-times" onclick="closeGiftModal()" style="cursor:pointer; color:rgba(255,255,255,0.5);"></i>
            </div>
            
            <label style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; display:block;">Selecciona un amigo:</label>
            <select id="giftFriendSelect" class="admin-input" style="width: 100%; margin-bottom: 16px;">
                <option value="">Cargando amigos...</option>
            </select>

            <label style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; display:block;">Mensaje (Opcional, dura 7 dÃ­as):</label>
            <textarea id="giftMessageInput" class="admin-input" rows="3" placeholder="Ej. Â¡Feliz CumpleaÃ±os! Disfruta este juego..." style="width: 100%; resize:none; margin-bottom: 24px;"></textarea>
            
            <button class="btn btn-primary" id="confirmGiftBtn" style="width: 100%; padding: 12px; font-weight: 600;">Confirmar Regalo</button>
        </div>
    </div>

    <script src="sparks.js"></script>
    <script src="products.js"></script>
    <script src="navigation.js"></script>
    <script type="module" src="friends.js"></script>
    <script type="module" src="wishlist.js"></script>
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, addDoc, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let product = null;
        let userData = null;
        let stockStatus = 'disponible'; // Default
        let defaultCredentials = '';

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                document.getElementById('prodName').textContent = 'Producto no encontrado';
                return;
            }

            // Fetch Product from Firestore
            try {
                const prodDoc = await getDoc(doc(db, "products", String(id)));
                if(prodDoc.exists()) {
                    product = prodDoc.data();
                    // We must attach id to the product object manually if it's not inside data()
                    product.id = prodDoc.id;
                } else if (typeof products !== 'undefined') {
                    // Fallback to local products.js if DB is completely empty (before admin seeded)
                    product = products.find(p => String(p.id) === String(id));
                }
            } catch(e) {
                console.error(e);
                if (typeof products !== 'undefined') {
                    product = products.find(p => String(p.id) === String(id));
                }
            }

            if (!product) {
                document.getElementById('prodName').textContent = 'Producto no encontrado';
                return;
            }

            // Fill UI basic details
            document.getElementById('prodName').textContent = product.name;
            document.getElementById('prodDesc').textContent = product.description;
            document.getElementById('prodPrice').innerHTML = `$${product.price.toFixed(2)} <span style="font-size:1rem; color:var(--text-secondary);">MXN</span>`;
            document.getElementById('prodImage').src = product.image;
            document.getElementById('prodCategory').textContent = product.category;

            // Fetch Real-time Stock Config from Firestore
            try {
                const stockDoc = await getDoc(doc(db, "products_stock", String(product.id)));
                if(stockDoc.exists()) {
                    stockStatus = stockDoc.data().status || 'disponible';
                    defaultCredentials = stockDoc.data().credentialsPool || '';
                }
            } catch(e) {
                console.error("Error fetching stock configuration:", e);
            }

            renderStockBadge();

            // Listen to auth
            onAuthStateChanged(auth, async (user) => {
                const buyBtn = document.getElementById('buyButton');
                const balanceText = document.getElementById('userBalanceText');
                
                if (user) {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        userData = userDoc.data();
                        userData.uid = user.uid;
                        balanceText.innerHTML = `Tu Saldo: <strong>$${userData.balance.toFixed(2)} MXN</strong>`;
                        
                        updateBuyButtonState();
                    }
                } else {
                    balanceText.textContent = "Inicia sesiÃ³n para comprar";
                    buyBtn.textContent = "Iniciar sesiÃ³n para comprar";
                    buyBtn.disabled = false;
                    buyBtn.onclick = () => window.location.href = 'perfil.html';
                }
            });
        });

        const renderStockBadge = () => {
            const container = document.getElementById('stockBadgeContainer');
            let badgeClass = 'stock-disponible';
            let label = 'Disponible';

            const lines = defaultCredentials.split('\n').filter(l => l.trim() !== '');
            const count = lines.length;

            if (count > 0) {
                label = `En Stock (${count})`;
                badgeClass = 'stock-disponible';
            } else if (stockStatus === 'bajo_pedido') {
                badgeClass = 'stock-bajo-pedido';
                label = 'Bajo pedido';
            } else if (stockStatus === 'agotado') {
                badgeClass = 'stock-agotado';
                label = 'Agotado';
            }

            container.innerHTML = `<span class="stock-badge ${badgeClass}">${label}</span>`;
        };

        const updateBuyButtonState = () => {
            const buyBtn = document.getElementById('buyButton');
            const balanceInputContainer = document.getElementById('balanceSelectorContainer');
            const balanceInput = document.getElementById('balanceToUseInput');
            
            if (stockStatus === 'agotado') {
                buyBtn.textContent = "PRODUCTO AGOTADO";
                buyBtn.disabled = true;
                buyBtn.onclick = null;
                balanceInputContainer.style.display = 'none';
                return;
            }

            buyBtn.disabled = false;

            const price = product.price;
            const balance = userData ? userData.balance : 0;

            if (balance > 0) {
                balanceInputContainer.style.display = 'block';
                
                // Max balance they can use is either their full balance, or the price of the product
                const maxUsable = Math.min(balance, price);
                balanceInput.max = maxUsable;
                
                // Default to max usable on first load
                if(!balanceInput.dataset.initialized) {
                    balanceInput.value = maxUsable;
                    balanceInput.dataset.initialized = 'true';
                }
                
                // Add event listener to update dynamic button text
                balanceInput.addEventListener('input', () => {
                    let val = parseFloat(balanceInput.value);
                    if(isNaN(val)) val = 0;
                    if(val < 0) balanceInput.value = 0;
                    if(val > maxUsable) balanceInput.value = maxUsable;
                    updateBuyButtonText();
                });
            } else {
                balanceInputContainer.style.display = 'none';
            }
            
            updateBuyButtonText();
        };

        const updateBuyButtonText = () => {
            const buyBtn = document.getElementById('buyButton');
            const price = product.price;
            const balanceInput = document.getElementById('balanceToUseInput');
            
            let val = parseFloat(balanceInput.value) || 0;
            
            if (!userData || userData.balance === 0) {
                buyBtn.textContent = "PAGAR CON TRANSFERENCIA BANCARIA";
                buyBtn.onclick = () => procesarCompra('transferencia', 0);
            } else if (val === price) {
                buyBtn.textContent = `COMPRAR CON SALDO ($${price.toFixed(2)} MXN)`;
                buyBtn.onclick = () => procesarCompra('saldo', val);
            } else if (val > 0) {
                const restante = price - val;
                buyBtn.textContent = `COMBINAR: $${val.toFixed(2)} Saldo + $${restante.toFixed(2)} Transf.`;
                buyBtn.onclick = () => procesarCompra('combinado', val);
            } else {
                buyBtn.textContent = "PAGAR CON TRANSFERENCIA BANCARIA";
                buyBtn.onclick = () => procesarCompra('transferencia', 0);
            }
        };

        const procesarCompra = async (metodo, balanceUsed, giftFriendUid = null, giftMessage = '') => {
            const buyBtn = document.getElementById('buyButton');
            buyBtn.disabled = true;
            buyBtn.textContent = "Procesando pedido...";

            try {
                const balance = userData.balance;
                const price = product.price;

                let finalStatus = 'pendiente';
                let finalDeliveredText = '';
                
                // Subtract exactly the amount the user selected
                const finalBalance = balance - balanceUsed;

                // Create Order document in Firestore
                const orderData = {
                    uid: giftFriendUid ? giftFriendUid : userData.uid, // Assigner
                    giftedBy: giftFriendUid ? userData.uid : null, // Sender
                    giftMessage: giftMessage,
                    userEmail: userData.email, // Kept for contact reference
                    productId: product.id,
                    productName: product.name,
                    price: price,
                    balanceUsed: balanceUsed,
                    status: finalStatus,
                    textDelivered: finalDeliveredText,
                    method: metodo,
                    timestamp: Date.now()
                };

                await addDoc(collection(db, "orders"), orderData);

                // Update User Balance in Firestore
                if (balanceUsed > 0) {
                    await updateDoc(doc(db, "users", userData.uid), {
                        balance: finalBalance
                    });
                }

                // Notify User and Redirect based on payment method
                if (metodo === 'saldo') {
                    // Fully paid with balance - no transfer needed
                    buyBtn.style.background = "var(--accent-green)";
                    buyBtn.textContent = "Â¡Pedido Registrado con Ã‰xito!";
                    
                    // Show a sleek toast or prompt
                    const toast = document.createElement('div');
                    toast.style.position = 'fixed';
                    toast.style.bottom = '20px';
                    toast.style.right = '20px';
                    toast.style.background = 'rgba(0, 210, 106, 0.9)';
                    toast.style.color = '#white';
                    toast.style.padding = '16px 24px';
                    toast.style.borderRadius = '12px';
                    toast.style.zIndex = '9999';
                    toast.style.backdropFilter = 'blur(10px)';
                    toast.style.boxShadow = '0 10px 30px rgba(0,0,0,0.3)';
                    toast.style.fontWeight = '600';
                    toast.innerHTML = '<i class="fas fa-check-circle"></i> Compra realizada. Redirigiendo a tu perfil para ver tu entrega...';
                    document.body.appendChild(toast);
                    
                    setTimeout(() => {
                        window.location.href = 'perfil.html';
                    }, 2500);
                } else {
                    // Bank transfer or combined - needs WhatsApp confirmation
                    let whatsText = `Hola, he realizado un pedido en GhostKey:%0A`;
                    whatsText += `ðŸ›’ *${product.name}*%0A`;
                    whatsText += `ðŸ’° MÃ©todo de pago: *${metodo.toUpperCase()}*%0A`;
                    
                    if (metodo === 'combinado') {
                        const restante = price - balanceUsed;
                        whatsText += `ðŸ’µ Combinado: UtilicÃ© $${balanceUsed.toFixed(2)} MXN de mi saldo y transferÃ­ el restante de *$${restante.toFixed(2)} MXN*.%0A`;
                    } else if (metodo === 'transferencia') {
                        whatsText += `ðŸ’µ Total a transferir: *$${price.toFixed(2)} MXN*.%0A`;
                    }
                    
                    whatsText += `ðŸ‘¤ Email: *${userData.email}*%0A`;
                    whatsText += `Adjunto mi comprobante para la entrega.`;

                    buyBtn.style.background = "var(--accent-yellow)";
                    buyBtn.style.color = "black";
                    buyBtn.textContent = "Redirigiendo a WhatsApp...";
                    
                    setTimeout(() => {
                        window.location.href = `https://wa.me/525574123521?text=${whatsText}`;
                    }, 1500);
                }

            } catch(error) {
                alert("Error al procesar la compra: " + error.message);
            }
        };

        // --- Gifting Logic ---
        document.getElementById('giftButton').addEventListener('click', async () => {
            document.getElementById('giftModal').classList.add('active');
            const select = document.getElementById('giftFriendSelect');
            select.innerHTML = '<option value="">Cargando amigos...</option>';
            
            try {
                const q1 = query(collection(db, "friendships"), where("uid1", "==", userData.uid), where("status", "==", "accepted"));
                const q2 = query(collection(db, "friendships"), where("uid2", "==", userData.uid), where("status", "==", "accepted"));
                
                const [s1, s2] = await Promise.all([getDocs(q1), getDocs(q2)]);
                let friends = [];
                s1.forEach(doc => friends.push({ ...doc.data() }));
                s2.forEach(doc => friends.push({ ...doc.data() }));
                
                select.innerHTML = '<option value="">Selecciona un amigo</option>';
                for (const f of friends) {
                    const friendUid = (f.uid1 === userData.uid) ? f.uid2 : f.uid1;
                    const friendDoc = await getDoc(doc(db, "users", friendUid));
                    if (friendDoc.exists()) {
                        const fname = friendDoc.data().username || friendDoc.data().email;
                        select.innerHTML += `<option value="${friendUid}">${fname}</option>`;
                    }
                }
                
                if (friends.length === 0) {
                    select.innerHTML = '<option value="">No tienes amigos agregados</option>';
                }
            } catch(e) {
                console.error(e);
                select.innerHTML = '<option value="">Error al cargar amigos</option>';
            }
        });

        window.closeGiftModal = () => {
            document.getElementById('giftModal').classList.remove('active');
        };

        document.getElementById('confirmGiftBtn').addEventListener('click', () => {
            const friendUid = document.getElementById('giftFriendSelect').value;
            const message = document.getElementById('giftMessageInput').value.trim();
            
            if (!friendUid) {
                alert("Debes seleccionar a un amigo.");
                return;
            }
            
            const balanceUsed = parseFloat(document.getElementById('balanceToUseInput').value) || 0;
            // Determine payment method
            const price = product.price;
            let metodo = 'transferencia';
            if (balanceUsed === price) metodo = 'saldo';
            else if (balanceUsed > 0) metodo = 'combinado';
            
            procesarCompra(metodo, balanceUsed, friendUid, message);
            closeGiftModal();
        });

        // Add gifting params to procesarCompra
        // We will modify the previous procesarCompra to handle gifted orders

    </script>
</body>
</html>
