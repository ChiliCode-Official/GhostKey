<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual - Producto</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            margin-top: 2rem;
        }
        .product-cover {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--glass-border);
        }
        .buy-panel {
            background: var(--bg-panel);
            padding: 2rem;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 100px;
        }
        .gift-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .gift-input-group {
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .gift-input-group.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @media (max-width: 1024px) {
            .product-detail-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="brand-logo">GKey</a>
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i></a>
                </li>
                <li class="nav-item active">
                    <a href="catalogo.html" class="nav-link"><i class="fa-solid fa-gamepad"></i></a>
                </li>
                <li class="nav-item">
                    <a href="perfil.html" class="nav-link"><i class="fa-solid fa-user"></i></a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="grid-column: 2 / span 2;">
            <header class="top-bar">
                <button class="btn-secondary" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i> Volver</button>
            </header>

            <section class="product-detail-container">
                <!-- Left: Image and Description -->
                <div>
                    <img src="" alt="Cargando..." id="p-image" class="product-cover">
                    <h1 id="p-title" style="margin-top: 1.5rem; font-size: 2.5rem;">Cargando...</h1>
                    <p id="p-desc" class="text-muted" style="margin-top: 1rem; line-height: 1.6;">...</p>
                </div>
                
                <!-- Right: Buy Panel -->
                <div class="buy-panel">
                    <div>
                        <span id="p-badge" class="stock-badge" style="position:static; display:inline-block; margin-bottom:10px;">...</span>
                        <h2 id="p-price" style="font-size: 2rem; color: var(--accent-primary);">$0.00</h2>
                    </div>

                    <div id="auth-state-message" style="color: var(--warning); font-size: 0.9rem;">
                        <i class="fa-solid fa-circle-exclamation"></i> Necesitas iniciar sesión para comprar.
                    </div>

                    <div id="buy-controls" style="display: none; flex-direction: column; gap: 1rem;">
                        <p>Tu saldo: <strong id="user-current-balance">$0.00</strong></p>
                        
                        <label class="gift-toggle">
                            <input type="checkbox" id="is-gift-checkbox"> Regalar a un amigo
                        </label>

                        <div class="gift-input-group" id="gift-inputs">
                            <label style="font-size: 0.9rem; color: var(--text-muted);">Correo del amigo:</label>
                            <input type="email" id="gift-email" placeholder="amigo@correo.com">
                        </div>
                        
                        <button id="btn-buy" class="btn-primary" style="padding: 15px; font-size: 1.1rem;">Comprar ahora</button>
                        <p id="buy-error" style="color: var(--danger); font-size: 0.8rem; display: none;"></p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Mobile Dock -->
    <nav class="mobile-dock">
        <a href="index.html" class="dock-item"><i class="fa-solid fa-house"></i></a>
        <a href="catalogo.html" class="dock-item active"><i class="fa-solid fa-gamepad"></i></a>
        <a href="perfil.html" class="dock-item"><i class="fa-solid fa-user"></i></a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="js/producto.js"></script>
</body>
</html>
