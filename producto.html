<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual - Producto</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            margin-top: 2rem;
        }
        .product-cover {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--glass-border);
        }
        .buy-panel {
            background: var(--bg-panel);
            padding: 2rem;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 100px;
            overflow: visible;
        }
        .gift-input-group {
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .gift-input-group.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 1024px) {
            .product-detail-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container no-right-panel">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="brand-logo">GKey</a>
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i></a>
                </li>
                <li class="nav-item active">
                    <a href="catalogo.html" class="nav-link"><i class="fa-solid fa-gamepad"></i></a>
                </li>
                <li class="nav-item">
                    <a href="perfil.html" class="nav-link"><i class="fa-solid fa-user"></i></a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="grid-column: 2 / span 2;">
            <header class="top-bar">
                <button class="btn-secondary" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i> Volver</button>
            </header>

            <section class="product-detail-container">
                <!-- Left: Image and Description -->
                <div>
                    <img src="" alt="Cargando..." id="p-image" class="product-cover">
                    <h1 id="p-title" style="margin-top: 1.5rem; font-size: 2.5rem;">Cargando...</h1>
                    <p id="p-desc" class="text-muted" style="margin-top: 1rem; line-height: 1.6;">...</p>
                </div>
                
                <!-- Right: Buy Panel -->
                <div class="buy-panel">
                    <div>
                        <span id="p-badge" class="stock-badge" style="position:static; display:inline-block; margin-bottom:10px;">...</span>
                        <h2 id="p-price" style="font-size: 2rem; color: var(--accent-primary);">$0.00</h2>
                    </div>

                    <div id="auth-state-message" style="color: var(--warning); font-size: 0.9rem;">
                        <i class="fa-solid fa-circle-exclamation"></i> Necesitas iniciar sesión para comprar.
                    </div>

                    <div id="buy-controls" style="display: none; flex-direction: column; gap: 1rem;" class="product-actions">
                        <p style="font-size: 0.9rem; color: var(--text-muted);">Tu saldo disponible: <strong id="user-current-balance" style="color: var(--accent-primary);">$0.00</strong></p>
                        
                        <div>
                            <button id="btn-toggle-gift" class="gift-btn-custom">
                              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="32px" height="32px">
                                <rect width="36" height="36" x="0" y="0" fill="#fdd835" rx="18"></rect>
                                <path fill="#e53935" d="M38.67,42H11.52C11.27,40.62,11,38.57,11,36c0-5,0-11,0-11s1.44-7.39,3.22-9.59 c1.67-2.06,2.76-3.48,6.78-4.41c3-0.7,7.13-0.23,9,1c2.15,1.42,3.37,6.67,3.81,11.29c1.49-0.3,5.21,0.2,5.5,1.28 C40.89,30.29,39.48,38.31,38.67,42z"></path>
                                <path fill="#01579b" d="M17.165,17.283c5.217-0.055,9.391,0.283,9,6.011c-0.391,5.728-8.478,5.533-9.391,5.337 c-0.913-0.196-7.826-0.043-7.696-5.337C9.209,18,13.645,17.32,17.165,17.283z"></path>
                              </svg>
                              <span class="now">a un amigo</span>
                              <span class="play">Regalar</span>
                            </button>
                            
                            <div id="gift-section" style="display:none; margin-top: 1rem; padding: 1rem; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--glass-border);">
                                <label style="font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Correo del amigo:</label>
                                <input type="email" id="gift-email" placeholder="amigo@email.com" style="width:100%; border:1px solid var(--glass-border); padding: 8px; border-radius:4px; background:var(--bg-main); color:white;">
                            </div>
                        </div>
                            
                        <button id="buy-btn" class="btn-buy-custom">
                            <i class="fa-solid fa-cart-shopping"></i> Comprar Ahora
                        </button>
                        <p id="buy-error" style="color: var(--danger); font-size: 0.8rem; display: none;"></p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
        <div class="mobile-menu__backdrop" id="mobile-menu-backdrop"></div>
        <div class="mobile-menu__panel">
            <p class="mobile-menu__title">Más opciones</p>
            <a href="index.html" class="mobile-menu__link"><i class="fa-solid fa-house"></i> Inicio</a>
            <a href="catalogo.html" class="mobile-menu__link"><i class="fa-solid fa-gamepad"></i> Catálogo</a>
            <a href="perfil.html" class="mobile-menu__link"><i class="fa-solid fa-user"></i> Perfil</a>
            <a href="info.html" class="mobile-menu__link"><i class="fa-solid fa-circle-info"></i> Información</a>
        </div>
    </div>

    <!-- Mobile Dock -->
    <nav class="mobile-dock">
        <a href="index.html" class="dock-item"><i class="fa-solid fa-house"></i></a>
        <a href="catalogo.html" class="dock-item active"><i class="fa-solid fa-gamepad"></i></a>
        <label class="hamburger dock-item" style="margin: 0; padding: 0;">
          <input type="checkbox" id="mobile-menu-toggle-prod">
          <svg viewBox="0 0 32 32">
            <path class="line line-top-bottom" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"></path>
            <path class="line" d="M7 16 27 16"></path>
          </svg>
        </label>
        <a href="#" class="dock-item"><i class="fa-solid fa-users"></i></a>
        <a href="perfil.html" class="dock-item"><i class="fa-solid fa-user"></i></a>
    </nav>

    <!-- Gift Confirmation Modal with Astronaut Space Animation -->
    <div class="modal" id="gift-confirmation-modal">
        <div class="modal-content" style="max-width: 480px; text-align: center; padding: 1.5rem;">
            <h3 style="color: var(--accent-primary); font-size: 1.3rem;">¡Regalo Enviado con Éxito! 🎁</h3>
            <p id="gift-modal-message" style="margin-top: 8px; font-size: 0.95rem; color: var(--text-main);">
                Nos esforzaremos al máximo para entregar tu regalo a tu amigo con la mayor rapidez posible.
            </p>

            <!-- Astronaut Space Animation (Uiverse JkHuger) -->
            <div class="astronaut-space-container">
                <div class="box-of-star1">
                    <div class="star star-position1"></div>
                    <div class="star star-position2"></div>
                    <div class="star star-position3"></div>
                    <div class="star star-position4"></div>
                    <div class="star star-position5"></div>
                    <div class="star star-position6"></div>
                    <div class="star star-position7"></div>
                </div>
                <div class="box-of-star2">
                    <div class="star star-position1"></div>
                    <div class="star star-position2"></div>
                    <div class="star star-position3"></div>
                    <div class="star star-position4"></div>
                    <div class="star star-position5"></div>
                    <div class="star star-position6"></div>
                    <div class="star star-position7"></div>
                </div>
                <div class="box-of-star3">
                    <div class="star star-position1"></div>
                    <div class="star star-position2"></div>
                    <div class="star star-position3"></div>
                    <div class="star star-position4"></div>
                    <div class="star star-position5"></div>
                    <div class="star star-position6"></div>
                    <div class="star star-position7"></div>
                </div>
                <div class="box-of-star4">
                    <div class="star star-position1"></div>
                    <div class="star star-position2"></div>
                    <div class="star star-position3"></div>
                    <div class="star star-position4"></div>
                    <div class="star star-position5"></div>
                    <div class="star star-position6"></div>
                    <div class="star star-position7"></div>
                </div>
                <div data-js="astro" class="astronaut">
                    <div class="head"></div>
                    <div class="arm arm-left"></div>
                    <div class="arm arm-right"></div>
                    <div class="body">
                        <div class="panel"></div>
                    </div>
                    <div class="leg leg-left"></div>
                    <div class="leg leg-right"></div>
                    <div class="schoolbag"></div>
                </div>
            </div>

            <p id="gift-recipient-info" style="font-weight: 700; color: #10b981; font-size: 1rem; margin-bottom: 1rem;">
                Para: <span id="gift-friend-name">Amigo</span>
            </p>

            <div style="display: flex; gap: 10px; flex-direction: column;">
                <button id="share-whatsapp-btn" class="btn-primary" style="background: #25D366; border: none; font-size: 1rem; padding: 12px; color: white;">
                    <i class="fa-brands fa-whatsapp"></i> Compartir por WhatsApp
                </button>
                <button class="btn-secondary" onclick="document.getElementById('gift-confirmation-modal').classList.remove('active')">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="js/producto.js"></script>
    <script type="module" src="js/mobile-nav.js"></script>
    <script type="module" src="js/cart.js"></script>
</body>
</html>
