<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos de Pago | GhostKey</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/S00u4EI.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="components.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader-overlay" id="page-loader">
        <div class="loader">
            <svg viewBox="0 0 80 80"><circle r="32" cy="40" cx="40" id="test"></circle></svg>
        </div>
        <div class="loader triangle">
            <svg viewBox="0 0 86 80"><polygon points="43 8 79 72 7 72"></polygon></svg>
        </div>
        <div class="loader">
            <svg viewBox="0 0 80 80"><rect height="64" width="64" y="8" x="8"></rect></svg>
        </div>
    </div>

    <div class="app-container">

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar" style="visibility: hidden;"></div>
                <div class="topbar-actions">
                    <div class="icon-btn" onclick="window.toggleFriendsSidebar()" style="cursor:pointer;" title="Amigos">
                        <i class="fas fa-user-friends"></i>
                    </div>
                    <div class="icon-btn" onclick="pageTransitionTo('index.html')" style="cursor:pointer;">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="user-profile" onclick="pageTransitionTo('perfil.html')" style="cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--accent-blue);">
                        <img src="https://i.imgur.com/S00u4EI.png" id="globalUserAvatar" alt="User" class="user-avatar" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    </div>
                </div>
            </header>

            <div class="content-scroll">
                <section class="gsap-reveal" style="max-width: 800px; margin: 0 auto; padding-top: 40px;">
                    <div style="text-align: center; margin-bottom: 48px;">
                        <i class="fas fa-wallet" style="font-size: 3rem; color: var(--accent-yellow); margin-bottom: 16px;"></i>
                        <h2 style="font-size: 2.5rem; margin-bottom: 16px;">Métodos de Pago y Recargas</h2>
                        <p style="color: var(--text-secondary); font-size: 1.1rem;">Usa las siguientes cuentas para transferir y agregar saldo o pagar pedidos directamente. Guarda tu comprobante.</p>
                    </div>

                    <div style="display: grid; gap: 24px;" id="methodsGrid">
                        <div style="text-align:center; padding:40px; color:var(--text-secondary);">Cargando métodos de pago...</div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="sparks.js"></script>
    <script src="navigation.js"></script>
    <script type="module" src="friends.js"></script>
    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener("DOMContentLoaded", async () => {
            gsap.registerPlugin(ScrollTrigger);

            const grid = document.getElementById('methodsGrid');
            try {
                const snap = await getDocs(collection(db, "payment_methods"));
                const methods = [];
                snap.forEach(docSnap => methods.push(docSnap.data()));

                const activeMethods = methods.filter(m => m.active);

                if(activeMethods.length === 0) {
                    grid.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-secondary);">No hay métodos de pago activos en este momento.</div>`;
                    return;
                }

                grid.innerHTML = activeMethods.map(m => `
                    <div style="display: flex; gap: 30px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color);">
                        
                        <!-- Details -->
                        <div style="flex-grow:1; min-width: 200px;">
                            <h3 style="font-size: 1.5rem; margin-bottom: 12px; color: var(--accent-yellow);"><i class="fas fa-university"></i> ${m.bank}</h3>
                            <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom:8px;"><strong>Beneficiario:</strong> ${m.name}</p>
                            <p style="color: var(--text-secondary); font-size: 0.95rem;"><strong>Concepto sugerido:</strong> ${m.concept || 'Pago DF'}</p>
                        </div>

                        <!-- Credit Card Visual -->
                        <div class="main-container" style="transform: scale(0.85); transform-origin: center; margin: -20px 0;">
                          <div class="card-border">
                            <div class="credit-card-bg">
                              <div class="card-shadow"></div>
                              <div class="card-content">
                                <div class="rev">GHOSTKEY</div>
                                <div class="chip"></div>
                                <div class="ultra-text">PREMIUM</div>
                                <div class="master one"></div>
                                <div class="master"></div>
                                <div class="master-text">MasterCard</div>
                              </div>
                            </div>
                          </div>
                        </div>

                        <!-- Terminal Card -->
                        <div class="terminal-card-container" style="flex: 1; min-width: 300px; margin-top: 0;">
                            <div class="wrap">
                                <div class="GhostKey">
                                    <hgroup class="head">
                                        <p class="title">
                                            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" height="16px" width="16px"><path d="M7 15L10 12L7 9M13 15H17M7.8 21H16.2C17.8802 21 18.7202 21 19.362 20.673C19.9265 20.3854 20.3854 19.9265 20.673 19.362C21 18.7202 21 17.8802 21 16.2V7.8C21 6.11984 21 5.27976 20.673 4.63803C20.3854 4.07354 19.9265 3.6146 19.362 3.32698C18.7202 3 17.8802 3 16.2 3H7.8C6.11984 3 5.27976 3 4.63803 3.32698C4.07354 3.6146 3.6146 4.07354 3.32698 4.63803C3 5.27976 3 6.11984 3 7.8V16.2C3 17.8802 3 18.7202 3.32698 19.362C3.6146 19.9265 4.07354 20.3854 4.63803 20.673C5.27976 21 6.11984 21 7.8 21Z"></path></svg>
                                            Copiar Cuenta / CLABE
                                        </p>
                                        <button type="button" tabindex="-1" class="copy_toggle" onclick="window.copyToClipboard('${m.account}')">
                                            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" height="16px" width="16px"><path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"></path><path d="M9 3m0 2a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v0a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2z"></path></svg>
                                        </button>
                                    </hgroup>
                                    <div class="body">
                                        <pre class="pre"><code>-&nbsp;</code><code>cuenta&nbsp;</code><code data-cmd="${m.account} " class="cmd"></code></pre>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

                gsap.utils.toArray('.gsap-reveal').forEach(elem => {
                    gsap.to(elem, {
                        scrollTrigger: { trigger: elem, scroller: ".content-scroll", start: "top 85%" },
                        opacity: 1, y: 0, duration: 0.8, ease: "power3.out"
                    });
                });

            } catch(e) {
                console.error(e);
                grid.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-secondary);">Error al cargar los métodos de pago: ${e.message}</div>`;
            }
        });

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                alert("¡Número de cuenta copiado: " + text + "!");
            });
        };
    </script>
</body>
</html>
