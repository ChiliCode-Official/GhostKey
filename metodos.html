<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos de Pago | GhostKey</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/S00u4EI.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div class="app-container">

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar" style="visibility: hidden;"></div>
                <div class="topbar-actions">
                    <div class="icon-btn" onclick="window.toggleFriendsSidebar()" style="cursor:pointer;" title="Amigos">
                        <i class="fas fa-user-friends"></i>
                    </div>
                    <div class="icon-btn" onclick="window.history.back()" style="cursor:pointer;">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                </div>
            </header>

            <div class="content-scroll">
                <section class="gsap-reveal" style="max-width: 800px; margin: 0 auto; padding-top: 40px;">
                    <div style="text-align: center; margin-bottom: 48px;">
                        <i class="fas fa-wallet" style="font-size: 3rem; color: var(--accent-yellow); margin-bottom: 16px;"></i>
                        <h2 style="font-size: 2.5rem; margin-bottom: 16px;">Métodos de Pago y Recargas</h2>
                        <p style="color: var(--text-secondary); font-size: 1.1rem;">Usa las siguientes cuentas para transferir y agregar saldo o pagar pedidos directamente. Guarda tu comprobante.</p>
                    </div>

                    <div style="display: grid; gap: 24px;" id="methodsGrid">
                        <div style="text-align:center; padding:40px; color:var(--text-secondary);">Cargando métodos de pago...</div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="sparks.js"></script>
    <script src="navigation.js"></script>
    <script type="module" src="friends.js"></script>
    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener("DOMContentLoaded", async () => {
            gsap.registerPlugin(ScrollTrigger);

            const grid = document.getElementById('methodsGrid');
            try {
                const snap = await getDocs(collection(db, "payment_methods"));
                const methods = [];
                snap.forEach(docSnap => methods.push(docSnap.data()));

                const activeMethods = methods.filter(m => m.active);

                if(activeMethods.length === 0) {
                    grid.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-secondary);">No hay métodos de pago activos en este momento.</div>`;
                    return;
                }

                grid.innerHTML = activeMethods.map(m => `
                    <div style="background: var(--card-bg); padding: 32px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 24px; position:relative;">
                        <i class="fas fa-university" style="font-size: 3rem; color: var(--accent-yellow); width: 64px; text-align: center;"></i>
                        <div style="flex-grow:1;">
                            <h3 style="font-size: 1.2rem; margin-bottom: 8px;">${m.bank}</h3>
                            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom:4px;"><strong>Beneficiario:</strong> ${m.name}</p>
                            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom:4px;"><strong>Cuenta / CLABE:</strong> <span style="font-family:monospace; color:white; font-size:1.1rem;">${m.account}</span></p>
                            <p style="color: var(--text-secondary); font-size: 0.9rem;"><strong>Concepto sugerido:</strong> ${m.concept || 'Pago DF'}</p>
                        </div>
                        <button class="action-btn" onclick="window.copyToClipboard('${m.account}')" style="background:#2a2a35;" title="Copiar número de cuenta">
                            <i class="fas fa-copy"></i> Copiar
                        </button>
                    </div>
                `).join('');

                gsap.utils.toArray('.gsap-reveal').forEach(elem => {
                    gsap.to(elem, {
                        scrollTrigger: { trigger: elem, scroller: ".content-scroll", start: "top 85%" },
                        opacity: 1, y: 0, duration: 0.8, ease: "power3.out"
                    });
                });

            } catch(e) {
                console.error(e);
                grid.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-secondary);">Error al cargar los métodos de pago: ${e.message}</div>`;
            }
        });

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                alert("¡Número de cuenta copiado: " + text + "!");
            });
        };
    </script>
</body>
</html>
