<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Digital Footprint</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/S00u4EI.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <img src="https://i.imgur.com/S00u4EI.png" alt="Logo" class="brand-icon">
                <span class="brand-name">FOOTPRINT</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </a>
                <a href="catalogo.html" class="nav-item active">
                    <i class="fas fa-th-large"></i>
                    <span>Catálogo</span>
                </a>
                <a href="metodos.html" class="nav-item">
                    <i class="fas fa-wallet"></i>
                    <span>Métodos</span>
                </a>
                <a href="comprar.html" class="nav-item">
                    <i class="fas fa-question-circle"></i>
                    <span>Ayuda</span>
                </a>
                <a href="contacto.html" class="nav-item">
                    <i class="fas fa-headset"></i>
                    <span>Contacto</span>
                </a>
            </nav>
            <div class="sidebar-section-title">TOP VENTAS</div>
            <div class="fast-launch">
                <div class="game-item" onclick="window.filterCatalog('vbucks')">
                    <img src="https://i.imgur.com/bAD3nB1.png" class="game-icon" alt="VBucks">
                    <span class="game-name">V-Bucks Ofertas</span>
                </div>
                <div class="game-item" onclick="window.filterCatalog('crew')">
                    <img src="https://i.imgur.com/3XpcBuu.png" class="game-icon" alt="Crew">
                    <span class="game-name">Fortnite Crew</span>
                </div>
                <div class="game-item" onclick="window.filterCatalog('discord')">
                    <img src="https://i.imgur.com/TT7IPi9.png" class="game-icon" alt="Discord">
                    <span class="game-name">Discord Nitro</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar productos..." onkeyup="window.searchProducts()">
                </div>
                
                <div class="topbar-actions">
                    <div class="icon-btn" onclick="window.location.href='index.html'" style="cursor:pointer;">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="user-profile" onclick="window.location.href='perfil.html'" style="cursor:pointer;">
                        <img src="https://i.imgur.com/S00u4EI.png" alt="User" class="user-avatar" style="background:var(--accent-blue);">
                    </div>
                </div>
            </header>

            <div class="content-scroll">
                <section class="gsap-reveal" style="margin-top: 20px;">
                    <div class="section-header">
                        <h2 class="section-title" style="font-size: 2rem;">Explorar Catálogo</h2>
                    </div>

                    <div class="category-filters">
                        <button class="filter-btn active" onclick="window.filterCatalog('all')">Todos</button>
                        <button class="filter-btn" onclick="window.filterCatalog('crew')">Fortnite Crew</button>
                        <button class="filter-btn" onclick="window.filterCatalog('vbucks')">V-Bucks</button>
                        <button class="filter-btn" onclick="window.filterCatalog('realms')">Realms</button>
                        <button class="filter-btn" onclick="window.filterCatalog('discord')">Discord</button>
                        <button class="filter-btn" onclick="window.filterCatalog('mayoreo')">Mayoreo</button>
                    </div>
                    
                    <div class="products-grid" id="catalogGrid">
                        <!-- Rendered by JS -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="sparks.js"></script>
    <script src="products.js"></script>
    <script src="navigation.js"></script>
    <script type="module" src="wishlist.js"></script>
    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let stockMap = {};
        let allProducts = [];

        const initCatalog = async () => {
            // Fetch products and stock from Firestore concurrently
            try {
                const [prodSnap, stockSnap] = await Promise.all([
                    getDocs(collection(db, "products")).catch(e => {
                        console.error("Firebase connection issue for products:", e);
                        return { empty: true, forEach: () => {} };
                    }),
                    getDocs(collection(db, "products_stock")).catch(e => {
                        console.error("Firebase stock check offline:", e);
                        return { forEach: () => {} };
                    })
                ]);

                if (prodSnap.empty === false || prodSnap.docs) {
                    prodSnap.forEach(docSnap => {
                        allProducts.push({ id: docSnap.id, ...docSnap.data() });
                    });
                } else if (typeof products !== 'undefined') {
                    allProducts = products;
                }

                stockSnap.forEach(docSnap => {
                    stockMap[docSnap.id] = docSnap.data();
                });
            } catch(e) {
                console.error("General Fetch Error:", e);
                if (typeof products !== 'undefined') allProducts = products;
            }

            // GSAP Animations (initialize on load)
            gsap.registerPlugin(ScrollTrigger);

            const renderProductCard = (product) => {
                const prodStock = stockMap[product.id] || { status: 'disponible', credentialsPool: '' };
                
                let badgeClass = 'stock-disponible';
                let label = 'Disponible';
                let isDisabled = false;

                const pool = prodStock.credentialsPool || "";
                const lines = pool.split('\n').filter(l => l.trim() !== '');

                if (lines.length > 0) {
                    label = `En Stock (${lines.length})`;
                } else if (prodStock.status === 'bajo_pedido') {
                    badgeClass = 'stock-bajo-pedido';
                    label = 'Bajo pedido';
                } else if (prodStock.status === 'agotado') {
                    badgeClass = 'stock-agotado';
                    label = 'Agotado';
                    isDisabled = true;
                }

                const badgeHtml = `<div class="product-badge stock-badge ${badgeClass}">${label}</div>`;
                
                return `
                <div class="product-card" style="${isDisabled ? 'opacity: 0.7;' : ''}">
                    <div class="product-image-container" onclick="window.location.href='producto.html?id=${product.id}'" style="cursor:pointer;">
                        <img src="${product.image}" alt="${product.name}">
                        ${badgeHtml}
                    </div>
                    <div class="product-info">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <h4 class="product-title" style="margin-bottom:0;" onclick="window.location.href='producto.html?id=${product.id}'" style="cursor:pointer;">${product.name}</h4>
                            <button class="wishlist-btn" data-productid="${product.id}" onclick="event.stopPropagation(); toggleWishlist('${product.id}')" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:1.2rem; transition:color 0.3s; z-index:10;"><i class="far fa-heart"></i></button>
                        </div>
                        <p class="product-desc" style="margin-top:8px;" onclick="window.location.href='producto.html?id=${product.id}'" style="cursor:pointer;">${product.description}</p>
                        <div class="product-footer">
                            <div class="price-box">
                                <span class="price-tag">MXN</span>
                                <span class="price">$${product.price.toFixed(2)}</span>
                            </div>
                            <button class="buy-btn" ${isDisabled ? 'disabled' : ''} onclick="window.location.href='producto.html?id=${product.id}'"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `;
            };

            const renderCatalog = (filterCat, searchQuery = "") => {
                const grid = document.getElementById('catalogGrid');
                if(!grid || allProducts.length === 0) return;

                let filtered = allProducts;
                
                if (filterCat !== 'all') {
                    filtered = filtered.filter(p => p.category === filterCat);
                }
                
                if (searchQuery) {
                    filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.description.toLowerCase().includes(searchQuery.toLowerCase()));
                }

                grid.innerHTML = filtered.map(renderProductCard).join('');
                
                // Refresh GSAP ScrollTrigger when grid content changes
                setTimeout(() => ScrollTrigger.refresh(), 100);
            };

            window.filterCatalog = (category) => {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                const activeBtn = Array.from(document.querySelectorAll('.filter-btn')).find(btn => btn.getAttribute('onclick').includes(category));
                if(activeBtn) activeBtn.classList.add('active');
                
                renderCatalog(category, document.getElementById('searchInput').value);
            };

            window.searchProducts = () => {
                const activeBtn = document.querySelector('.filter-btn.active');
                let cat = 'all';
                if (activeBtn) {
                    const match = activeBtn.getAttribute('onclick').match(/'([^']+)'/);
                    if (match) cat = match[1];
                }
                renderCatalog(cat, document.getElementById('searchInput').value);
            };

            // Check URL parameters for initial filters
            const urlParams = new URLSearchParams(window.location.search);
            const filter = urlParams.get('filter');
            const search = urlParams.get('search');
            if (search) {
                document.getElementById('searchInput').value = search;
                renderCatalog(filter || 'all', search);
            } else if(filter) {
                window.filterCatalog(filter);
            } else {
                renderCatalog('all');
            }
        };

        // Run
        initCatalog();
    </script>
</body>
</html>
