<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual - Catálogo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 15px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            color: var(--text-main);
            border-color: var(--accent-primary);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="brand-logo">GKey</a>
            <ul class="nav-links">
                <div class="nav-indicator" style="top: 75px;"></div>
                <li class="nav-item">
                    <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i></a>
                </li>
                <li class="nav-item active">
                    <a href="catalogo.html" class="nav-link"><i class="fa-solid fa-gamepad"></i></a>
                </li>
                <li class="nav-item">
                    <a href="perfil.html" class="nav-link"><i class="fa-solid fa-user"></i></a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="grid-column: 2 / span 2;">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar productos...">
                </div>
                <div class="top-actions">
                    <a href="perfil.html" class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=A182E8&color=fff" alt="User" class="user-avatar">
                    </a>
                </div>
            </header>

            <section style="margin-top: 1rem;">
                <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem;">Catálogo</h1>
                
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">Todos</button>
                    <button class="filter-btn" data-filter="juegos">Juegos</button>
                    <button class="filter-btn" data-filter="cuentas">Cuentas</button>
                    <button class="filter-btn" data-filter="saldo">Saldo Virtual</button>
                </div>

                <div class="catalog-grid" id="catalog-grid">
                    <!-- Products injected by JS -->
                    <div style="text-align:center; padding: 2rem; color: var(--text-muted); grid-column: 1/-1;">
                        <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 10px;">Cargando catálogo...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Mobile Dock -->
    <nav class="mobile-dock">
        <a href="index.html" class="dock-item"><i class="fa-solid fa-house"></i></a>
        <a href="catalogo.html" class="dock-item active"><i class="fa-solid fa-gamepad"></i></a>
        <a href="perfil.html" class="dock-item"><i class="fa-solid fa-user"></i></a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="js/catalogo.js"></script>
</body>
</html>
