<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual - Catálogo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 15px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            color: var(--text-main);
            border-color: var(--accent-primary);
        }
    </style>
</head>
<body>

    <div class="dashboard-container no-right-panel">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="brand-logo">GKey</a>
            <ul class="nav-links">
                <div class="nav-indicator" style="top: 75px;"></div>
                <li class="nav-item">
                    <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i></a>
                </li>
                <li class="nav-item active">
                    <a href="catalogo.html" class="nav-link"><i class="fa-solid fa-gamepad"></i></a>
                </li>
                <li class="nav-item">
                    <a href="perfil.html" class="nav-link"><i class="fa-solid fa-user"></i></a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="grid-column: 2 / span 2;">
            <header class="top-bar">
                <div class="inputbox">
                    <input required="required" type="text" id="search-input">
                    <span>Buscar productos...</span>
                    <i></i>
                </div>
                <div class="top-actions">
                    <a href="perfil.html" class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=A182E8&color=fff" alt="User" class="user-avatar">
                    </a>
                </div>
            </header>

            <section style="margin-top: 1rem;">
                <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem;">Catálogo</h1>
                
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">Todos</button>
                    <button class="filter-btn" data-filter="juegos">Juegos</button>
                    <button class="filter-btn" data-filter="cuentas">Cuentas</button>
                    <button class="filter-btn" data-filter="saldo">Saldo Virtual</button>
                </div>

                <div class="catalog-grid" id="catalog-grid">
                    <!-- Products injected by JS -->
                </div>
            </section>
        </main>
    </div>

    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
        <div class="mobile-menu__backdrop" id="mobile-menu-backdrop"></div>
        <div class="mobile-menu__panel">
            <p class="mobile-menu__title">Más opciones</p>
            <a href="index.html" class="mobile-menu__link"><i class="fa-solid fa-house"></i> Inicio</a>
            <a href="catalogo.html" class="mobile-menu__link"><i class="fa-solid fa-gamepad"></i> Catálogo</a>
            <a href="perfil.html" class="mobile-menu__link"><i class="fa-solid fa-user"></i> Perfil</a>
            <a href="info.html" class="mobile-menu__link"><i class="fa-solid fa-circle-info"></i> Información</a>
        </div>
    </div>

    <!-- Mobile Dock -->
    <nav class="mobile-dock">
        <a href="index.html" class="dock-item"><i class="fa-solid fa-house"></i></a>
        <a href="catalogo.html" class="dock-item active"><i class="fa-solid fa-gamepad"></i></a>
        <label class="hamburger dock-item" style="margin: 0; padding: 0;">
          <input type="checkbox" id="mobile-menu-toggle-cat">
          <svg viewBox="0 0 32 32">
            <path class="line line-top-bottom" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"></path>
            <path class="line" d="M7 16 27 16"></path>
          </svg>
        </label>
        <a href="#" class="dock-item"><i class="fa-solid fa-users"></i></a>
        <a href="perfil.html" class="dock-item"><i class="fa-solid fa-user"></i></a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="js/catalogo.js"></script>
    <script type="module" src="js/mobile-nav.js"></script>
</body>
</html>
